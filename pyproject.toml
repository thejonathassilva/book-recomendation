[tool.ruff]
line-length = 120
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: treino completo ou integração pesada (ex.: train --mock)",
]
# Sem --cov-fail-under aqui: rodar um subconjunto de testes deixaria a cobertura global baixa e falharia à toa.
# O CI (`.github/workflows/ml-pipeline.yml`) usa `--cov-fail-under=80` na suíte completa.
addopts = "--cov=src --cov-report=term-missing"

[tool.coverage.run]
source = ["src"]
omit = [
    "*/src/data/seed_data.py",
    "*/src/data/sync_book_embeddings.py",
    "*/src/training/train.py",
    "*/src/training/register.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
