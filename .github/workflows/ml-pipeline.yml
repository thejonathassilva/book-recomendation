name: ML Pipeline CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=80
      - name: Run linting
        run: ruff check src/ tests/
      - name: Type check
        run: mypy src/ --ignore-missing-imports || true

  train-and-evaluate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Train model (synthetic)
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: python -m src.training.train --mock
      - name: Evaluate baseline
        run: python -m src.training.evaluate --k 10 || true

  publish-image:
    needs: [train-and-evaluate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Nome da imagem (minúsculas, exigência GHCR)
        id: image
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bookstore-api" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.image.outputs.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
