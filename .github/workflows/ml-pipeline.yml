name: ML Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=80
      - name: Run linting
        run: ruff check src/ tests/
      - name: Type check
        run: mypy src/ --ignore-missing-imports || true

  train-and-evaluate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Train model (synthetic)
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: python -m src.training.train --mock
      - name: Evaluate baseline
        run: python -m src.training.evaluate --k 10 || true

  deploy:
    needs: train-and-evaluate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t bookstore-ml:${{ github.sha }} .
