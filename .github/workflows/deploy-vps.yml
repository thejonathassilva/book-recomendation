# Deploy manual da API no servidor (pull da imagem GHCR + compose).
#
# Segredos do repositório (Settings → Secrets):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY — SSH
#   VPS_WORKDIR — diretório no servidor com o clone do repo (ex.: /opt/bookstore)
#   BOOKSTORE_API_IMAGE — igual à imagem publicada pelo CI (ex.: ghcr.io/dono/repo/bookstore-api)
#
# Opcional: VPS_PORT (predefinido 22 no cliente SSH se omitido)

name: Deploy API (SSH)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da imagem (latest ou SHA do commit publicado no GHCR)"
        default: "latest"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull e subir api no VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          BOOKSTORE_API_IMAGE: ${{ secrets.BOOKSTORE_API_IMAGE }}
          BOOKSTORE_API_TAG: ${{ inputs.tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: BOOKSTORE_API_IMAGE,BOOKSTORE_API_TAG
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_WORKDIR }}"
            bash scripts/deploy-api.sh
