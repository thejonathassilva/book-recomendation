# Local dev stack
#
# Backend (Postgres, Redis, MLflow, API):
#   docker compose up -d --build
#
# Incluir interface Next.js (porta 3001):
#   docker compose --profile ui up -d --build
#
# Seed demo data (optional embeddings; see README):
#   docker compose exec api python -m src.data.seed_data
#   docker compose exec api python -m src.data.sync_book_embeddings
#
# Stack opcional (Prometheus + Grafana):
#   docker compose --profile monitoring up -d
#
# Login após seed: demo@bookstore.com / demo123
# - API + docs: http://localhost:8000
# - UI:          http://localhost:3001
# - MLflow:      http://localhost:5000

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore
      POSTGRES_DB: bookstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://bookstore:bookstore@postgres:5432/bookstore
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      JWT_SECRET: change-me-in-production-use-long-secret
      CONFIG_DIR: /app/config
      TRAIN_METRICS_EXPORT_PATH: /app/data/train_metrics_last.json
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.49.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_started

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:10.3.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mlflow_data:
  grafana_data:
